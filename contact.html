			<div class="logo-wrapper">

					<svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
						<circle cx="50" cy="50" r="50" fill="#000" />
						<circle cx="50" cy="50" r="45" fill="rgb(41, 98, 255)" />
						<text x="50" y="50" font-size="55" fill="#fff" text-anchor="middle"
							dominant-baseline="middle" font-family="Impact">
							AF
						</text>
					</svg>
					<div class="text-group">
						<h3>Portofolio</h3>
						<h3 class="biru">Arif</h3>
						<p>Lorem ipsum dolor</p>
					</div>
				</div>
			</div>
			<nav>
				<h1>My Online Resume</h1>
				<ul>
					<li>
						<a href="./index.html">Home</a>
					</li>
					<li>
						<a href="./educatioan.html">Education</a>
					</li>
					<li>
						<a href="./skill.html">Skills</a>
					</li>
					<li>
						<a href="./portfolio.html">Portfolio</a>
					</li>
					<li>
						<a href="./contact.html">Contact Me</a>
					</li>

				</ul>
			</nav>
		</header>

		<main>

			<section>

				<article>
					<header>
						<h1>Contact Me</h1>
					</header>
					<div id="main">

						<form action="./" method="GET">
							<fieldset>
								<legend>
									<h2>Plese add your contact details here</h2>
								</legend>
								<table>
									<tr>
										<td>
											<label for="name">Name: </label>
										</td>
										<td>
											<input required placeholder="Your Full Name" type="text"
												name="name" id="name">
										</td>
									</tr>
									<tr>
										<td>
											<label for="age">Age: </label>
										</td>
										<td>
											<input required placeholder="Your Age" type="number" name="age"
												id="age">
										</td>
									</tr>
									<tr>
										<td>
											<label for="dob">Date of Birth: </label>
										</td>
										<td>
											<input required type="date" name="dob" id="dob">
										</td>
									</tr>
									<tr>
										<td>
											<label for="phoneNumber">Mobile Number: </label>
										</td>
										<td>
											<input required placeholder="01x-xxx-xxxx" type="number"
												name="phoneNumber" id="phoneNumber">
										</td>
									</tr>
									<tr>
										<td>
											<label for="country">Country: </label>
										</td>
										<td>
											<select required name="country" id="country">
												<option value="Select" selected disabled>Select country
												</option>
												<option value="malaysia">Malaysia</option>
											</select>
										</td>
									</tr>
									<tr>
										<td>
											<label for="gender">Gender: </label>
										</td>
										<td>
											<label for="male">
											<input required type="radio" name="gender" id="male"
												value="Male">
												Male
											</label>
											<label for="female">
											<input type="radio" name="gender" id="female" value="Female">
												Female
											</label>
										</td>
									</tr>
									<tr>
										<td>
											<label for="email">Email: </label>
										</td>
										<td>
											<input required placeholder="Email" type="email" name="email"
												id="email">
										</td>
									</tr>
									<tr>
										<td>
											<label for="company">Personal / Company Website : </label>
										</td>
										<td>
											<input required placeholder="Your Website" type="url"
												name="company" id="company">
										</td>
									</tr>
									<tr>
										<td>
											<label for="method">Preferred method of contact : </label>
										</td>
										<td>
											<label for="phone">
												<input type="checkbox" name="method" id="phone">
												Phone
											</label>
											<label for="email2">
											<input type="checkbox" name="method" id="email2">
												Email
											</label>
										</td>
									</tr>
									<tr>
										<td>
											<label for="message">Message : </label>
										</td>
										<td>
											<textarea required placeholder="Type your message here...~"
												name="message" id="message" cols="40" rows="5"></textarea>
										</td>
									</tr>
								</table>

								<button class="btn-submit" type="submit">Submit Form</button>
								<button class="btn-clear" type="reset">Clear Form</button>
							</fieldset>
						</form>

					</div>
				</article>

			</section>
		</main>

		<footer>
			<div class="sosial">
				<h4>Follow Me:</h4>
				<div class="social-link-container">
					<img id="twitter" src="./source/image/Twitter.png" alt=""
						onmouseover="this.src='./source/image/Twitter_Outline.png'"
						onmouseleave="this.src='./source/image/Twitter.png'" />
					<img id="facebook" src="./source/image/Facebook.png" alt=""
						onmouseover="this.src='./source/image/Facebook_Outline.png'"
						onmouseleave="this.src='./source/image/Facebook.png'" />
					<img id="instagram" src="./source/image/Instagram.png" alt=""
						onmouseover="this.src='./source/image/Instagram_Outline.png'"
						onmouseleave="this.src='./source/image/Instagram.png'" />
					<img id="youtube" src="./source/image/Youtube.png" alt=""
						onmouseover="this.src='./source/image/Youtube_Outline.png'"
						onmouseleave="this.src='./source/image/Youtube.png'" />
				</div>
			</div>

					width="600" height="450" style="border: 0" allowfullscreen="" loading="lazy"
					referrerpolicy="no-referrer-when-downgrade"></iframe>
			</div>
		</footer>

	</div>
</body>
